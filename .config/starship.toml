# Starship prompt config
# Docs: https://starship.rs/config/
# To revert: delete this file and remove the starship init line from ~/.zshrc

# Git status symbols:
#   ? = untracked files
#   ! = modified files
#   + = staged files
#   > = ahead of remote
#   < = behind remote
#   * = stashed changes

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$nodejs\
$rust\
$c\
$dotnet\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[>](bold #d4a656)"
error_symbol = "[>](bold #c75450)"
vimcmd_symbol = "[<](bold #8faf6e)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #e8c882"

[git_branch]
format = "[$branch]($style) "
style = "bold #b8a070"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "#a08060"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold #c75450"

[python]
format = '[py $version( \($virtualenv\))]($style) '
style = "#d4a656"

[nodejs]
format = '[node $version]($style) '
style = "#8faf6e"

[rust]
format = '[rs $version]($style) '
style = "#c78656"

[c]
format = '[c $version]($style) '
style = "#7ea8c4"

[dotnet]
format = '[.net $version]($style) '
style = "#6eaab8"

[cmd_duration]
min_time = 2_000
format = '[$duration]($style) '
style = "#a08060"
